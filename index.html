<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Logbook">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <title>Logbook</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F8F7F4;
      --surface: #FFFFFF;
      --border: rgba(0,0,0,0.09);
      --text-1: #1A1A1A;
      --text-2: #6B7280;
      --text-3: #9CA3AF;
      --blue: #2563EB;
      --blue-bg: #EFF6FF;
      --blue-bd: #93C5FD;
      --green: #16A34A;
      --green-bg: #F0FDF4;
      --green-bd: #86EFAC;
      --amber: #B45309;
      --amber-bg: #FFFBEB;
      --amber-bd: #FCD34D;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F0F0F;
        --surface: #1C1C1E;
        --border: rgba(255,255,255,0.1);
        --text-1: #F2F2F7;
        --text-2: #8E8E93;
        --text-3: #636366;
        --blue: #60A5FA;
        --blue-bg: #1E3A5F;
        --blue-bd: #1D4ED8;
        --green: #4ADE80;
        --green-bg: #14532D;
        --green-bd: #166534;
        --amber: #FCD34D;
        --amber-bg: #451A03;
        --amber-bd: #92400E;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ── Header ── */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: calc(14px + var(--safe-top)) 20px 16px;
      flex-shrink: 0;
    }

    .hrow { display: flex; justify-content: space-between; align-items: flex-end; }

    .app-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.6px;
      color: var(--text-1);
    }

    .stats { display: flex; gap: 18px; }

    .stat { text-align: right; }
    .stat-n { font-size: 22px; font-weight: 600; color: var(--text-1); line-height: 1; }
    .stat-l { font-size: 10px; color: var(--text-3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── Filter bar ── */
    #filter-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    #filter-bar::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      padding: 7px 15px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-family: inherit;
    }
    .chip.a-all      { background: var(--text-1);    color: var(--bg);        border-color: var(--text-1);    }
    .chip.a-learning { background: var(--blue-bg);   color: var(--blue);      border-color: var(--blue-bd);   }
    .chip.a-health   { background: var(--green-bg);  color: var(--green);     border-color: var(--green-bd);  }
    .chip.a-personal { background: var(--amber-bg);  color: var(--amber);     border-color: var(--amber-bd);  }

    /* ── Scroll area ── */
    #scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(90px + var(--safe-bottom));
    }

    .date-section { margin-bottom: 22px; }

    .date-hdr {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-3);
      margin-bottom: 8px;
      padding-left: 4px;
    }

    /* ── Entry card ── */
    .entry {
      background: var(--surface);
      border-radius: 14px;
      padding: 13px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 11px;
      border-left: 3px solid transparent;
    }
    .e-learning { border-left-color: var(--blue-bd); }
    .e-health   { border-left-color: var(--green-bd); }
    .e-personal { border-left-color: var(--amber-bd); }

    .eicon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .ei-learning { background: var(--blue-bg); }
    .ei-health   { background: var(--green-bg); }
    .ei-personal { background: var(--amber-bg); }

    .ebody { flex: 1; min-width: 0; }
    .etext { font-size: 15px; line-height: 1.5; color: var(--text-1); word-break: break-word; }
    .ecat  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 5px; }
    .ec-learning { color: var(--blue); }
    .ec-health   { color: var(--green); }
    .ec-personal { color: var(--amber); }

    .del-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--text-3); padding: 4px; border-radius: 6px;
      font-size: 15px; flex-shrink: 0; line-height: 1;
    }

    /* ── FAB ── */
    #fab {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      right: 24px;
      width: 60px; height: 60px;
      background: var(--text-1);
      color: var(--bg);
      border: none; border-radius: 50%;
      font-size: 30px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.22);
      z-index: 100;
      font-family: inherit;
    }
    #fab:active { transform: scale(0.93); }

    /* ── Sheet overlay ── */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
    }
    #overlay.open { display: flex; align-items: flex-end; }

    #sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 14px 20px calc(20px + var(--safe-bottom));
      width: 100%;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #overlay.open #sheet { transform: translateY(0); }

    .handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .sheet-title { font-size: 17px; font-weight: 600; margin-bottom: 14px; }

    #ach-input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 16px;
      color: var(--text-1);
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
    }
    #ach-input:focus { border-color: #3B82F6; }

    .cat-row { display: flex; gap: 8px; margin: 12px 0; }

    .cpick {
      flex: 1;
      padding: 11px 6px 9px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      color: var(--text-2);
      font-family: inherit;
    }
    .cicon { display: block; font-size: 22px; margin-bottom: 5px; }
    .cp-learning { background: var(--blue-bg);  color: var(--blue);  border-color: var(--blue-bd);  }
    .cp-health   { background: var(--green-bg); color: var(--green); border-color: var(--green-bd); }
    .cp-personal { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-bd); }

    #save-btn {
      width: 100%;
      padding: 16px;
      background: var(--text-1);
      color: var(--bg);
      border: none; border-radius: 13px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 6px;
      font-family: inherit;
    }
    #save-btn:disabled { opacity: 0.3; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 64px 20px; }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    .empty-sub   { font-size: 14px; color: var(--text-3); line-height: 1.6; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hrow">
      <div class="app-title">Logbook</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-n" id="s-today">0</div>
          <div class="stat-l">Today</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="s-total">0</div>
          <div class="stat-l">Total</div>
        </div>
      </div>
    </div>
  </div>

  <div id="filter-bar">
    <button class="chip a-all" data-f="all" onclick="setFilter(this)">All</button>
    <button class="chip" data-f="learning" onclick="setFilter(this)">📚 Learning</button>
    <button class="chip" data-f="health"   onclick="setFilter(this)">🌿 Health</button>
    <button class="chip" data-f="personal" onclick="setFilter(this)">⭐ Personal</button>
  </div>

  <div id="scroll-area">
    <div id="list"></div>
  </div>

  <button id="fab" onclick="openSheet()" aria-label="Add achievement">+</button>
</div>

<!-- Bottom sheet -->
<div id="overlay" onclick="overlayClick(event)">
  <div id="sheet">
    <div class="handle"></div>
    <div class="sheet-title">New achievement</div>
    <textarea id="ach-input" rows="3" placeholder="What did you accomplish today?"></textarea>
    <div class="cat-row">
      <button class="cpick cp-learning" data-c="learning" onclick="setCat(this)">
        <span class="cicon">📚</span>Learning
      </button>
      <button class="cpick" data-c="health" onclick="setCat(this)">
        <span class="cicon">🌿</span>Health
      </button>
      <button class="cpick" data-c="personal" onclick="setCat(this)">
        <span class="cicon">⭐</span>Personal
      </button>
    </div>
    <button id="save-btn" onclick="saveEntry()" disabled>Save</button>
  </div>
</div>

<script>
  let data = JSON.parse(localStorage.getItem('logbook_v1') || '[]');
  let filter = 'all';
  let selCat = 'learning';

  const CATS = {
    learning: { label: 'Learning', icon: '📚' },
    health:   { label: 'Health',   icon: '🌿' },
    personal: { label: 'Personal', icon: '⭐' }
  };

  function persist() { localStorage.setItem('logbook_v1', JSON.stringify(data)); }

  function todayStr() { return new Date().toISOString().split('T')[0]; }

  function fmtDate(d) {
    const now = new Date(); now.setHours(0,0,0,0);
    const dt  = new Date(d + 'T00:00:00');
    const diff = Math.round((now - dt) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render() {
    const t = todayStr();
    document.getElementById('s-today').textContent = data.filter(a => a.date === t).length;
    document.getElementById('s-total').textContent = data.length;

    const filtered = filter === 'all' ? data : data.filter(a => a.category === filter);
    const grouped  = {};
    filtered.forEach(a => { (grouped[a.date] = grouped[a.date] || []).push(a); });
    const dates = Object.keys(grouped).sort((a,b) => b.localeCompare(a));

    const list = document.getElementById('list');
    if (!dates.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📖</div><div class="empty-title">Nothing here yet</div><div class="empty-sub">Tap + to log your first achievement</div></div>';
      return;
    }
    list.innerHTML = dates.map(d => `
      <div class="date-section">
        <div class="date-hdr">${fmtDate(d)}</div>
        ${grouped[d].map(a => `
          <div class="entry e-${a.category}">
            <div class="eicon ei-${a.category}">${CATS[a.category].icon}</div>
            <div class="ebody">
              <div class="etext">${esc(a.text)}</div>
              <div class="ecat ec-${a.category}">${CATS[a.category].label}</div>
            </div>
            <button class="del-btn" onclick="del(${a.id})" aria-label="Delete">✕</button>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  function del(id) {
    if (!confirm('Delete this entry?')) return;
    data = data.filter(a => a.id !== id);
    persist(); render();
  }

  function setFilter(el) {
    filter = el.dataset.f;
    document.querySelectorAll('.chip').forEach(c => c.className = 'chip');
    el.className = 'chip a-' + filter;
    render();
  }

  function openSheet() {
    document.getElementById('ach-input').value = '';
    document.getElementById('save-btn').disabled = true;
    // reset cat to learning
    selCat = 'learning';
    document.querySelectorAll('.cpick').forEach(b => b.className = 'cpick' + (b.dataset.c === 'learning' ? ' cp-learning' : ''));
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('ach-input').focus(), 320);
  }

  function closeSheet() { document.getElementById('overlay').classList.remove('open'); }

  function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeSheet(); }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('ach-input').addEventListener('input', function() {
      document.getElementById('save-btn').disabled = !this.value.trim();
    });
  });

  function setCat(el) {
    selCat = el.dataset.c;
    document.querySelectorAll('.cpick').forEach(b => {
      b.className = 'cpick' + (b === el ? ' cp-' + selCat : '');
    });
  }

  function saveEntry() {
    const txt = document.getElementById('ach-input').value.trim();
    if (!txt) return;
    data.unshift({ id: Date.now(), text: txt, category: selCat, date: todayStr() });
    persist(); render(); closeSheet();
  }

  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

  render();
</script>
</body>
</html>
